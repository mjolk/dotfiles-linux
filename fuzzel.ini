[main]
# Font and Appearance
font=SauceCodePro NFM:size=12
dpi-aware=auto
icons-enabled=yes
prompt=">> "
lines=10
width=40
horizontal-pad=30
vertical-pad=10
inner-pad=10

# Behavior
fuzzy=yes
show-actions=no
exit-on-keyboard-focus-loss=yes

[colors]
# Example: Dracula-inspired colors (RGBA)
background=282a36ff
text=f8f8f2ff
match=8be9fdff
selection=44475aff
selection-text=f8f8f2ff
selection-match=8be9fdff
border=6272a4ff

[border]
width=2
radius=10

[key-bindings]
# Example keybinding changes
cancel=Escape Control+g
